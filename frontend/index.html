<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Cassette</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f7b4ce">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=VT323&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sky">
        <div class="clouds"></div>
        <div class="stars"></div>
        <div class="moon">🌙</div>

        <div class="cassette-wrapper">
            <div class="cassette">
                <!-- Screws -->
                <div class="screw tl">○</div>
                <div class="screw tr">○</div>
                <div class="screw bl">○</div>
                <div class="screw br">○</div>

                <!-- Label Area -->
                <div class="label-area">
                    <div class="brand">WAGBA MUSIC</div>
                    
                    <div class="tape-window">
                        <div class="magnetic-tape"></div>
                        <div class="reel-container">
                            <div class="reel reel-left">
                                <div class="hub"></div>
                                <div class="spokes">
                                    <div class="spoke"></div>
                                    <div class="spoke rot60"></div>
                                    <div class="spoke rot120"></div>
                                </div>
                            </div>
                            <div class="reel reel-right">
                                <div class="hub"></div>
                                <div class="spokes">
                                    <div class="spoke"></div>
                                    <div class="spoke rot60"></div>
                                    <div class="spoke rot120"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <form id="mood-form">
                        <input type="text" id="mood-input" placeholder="MY BEST..." autocomplete="off" required>
                    </form>
                </div>
                
                <!-- Sakura Decorations -->
                <div class="sakura cherry-1">🌸</div>
                <div class="sakura cherry-2">🌸</div>
                <div class="sakura cherry-3">🌸</div>
                <div class="sakura cherry-4">🌸</div>
                <div class="sakura cherry-5">🌸</div>

                <div class="cassette-bottom">
                    <div class="hole"></div>
                    <div class="hole small"></div>
                    <div class="hole"></div>
                    <div class="hole small"></div>
                    <div class="hole"></div>
                </div>
            </div>
            <div id="loading" class="hidden">Winding tape...</div>
        </div>

        <div id="player-modal" class="hidden">
            <button id="close-btn">✖</button>
            <div id="youtube-embed"></div>
            <div class="playlist-container">
                <h3>Vibe Queue</h3>
                <ul id="playlist"></ul>
            </div>
        </div>
    </div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
