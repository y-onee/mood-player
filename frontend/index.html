<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Cassette</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#F295A7">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600&family=Varela+Round&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Deep Link Auto-Launcher -->
    <script>
        // When visiting the website, automatically prompt the OS to open the Desktop App
        window.onload = () => {
            // Prevent the Desktop App from launching itself!
            if (navigator.userAgent.toLowerCase().includes('electron')) return;

            // If the user explicitly clicked the fallback button, keep them in the browser
            if (window.location.search.includes('web=true')) return;

            // Trigger the OS deep-link
            window.location.href = 'moodplayer://launch';
            
            // Replace the UI to say the app has been launched!
            setTimeout(() => {
                document.body.innerHTML = `
                    <div style="display:flex; height:100vh; align-items:center; justify-content:center; flex-direction:column; background:#FFD4DF; font-family:'Quicksand', sans-serif; color:#C46779;">
                        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Cassette is playing on your Desktop!</h1>
                        <button onclick="window.location.href='?web=true'" style="margin-top:30px; padding:15px 30px; border:none; border-radius:15px; background:#C46779; color:white; cursor:pointer; font-family:'Quicksand', sans-serif; font-size:1.1rem; font-weight:bold; box-shadow: 0 4px 10px rgba(196,103,121,0.4);">
                            Click here to use the Web Version instead
                        </button>
                    </div>
                `;
            }, 1000);
        };
    </script>

    <div class="sky">
        <div class="cassette-wrapper">
            <div class="cassette" id="cassette">
                <div class="cassette-face cassette-front">
                    <div class="cassette-tab tab-top tab-left"></div>
                    <div class="cassette-tab tab-top tab-right"></div>
                    <div class="cassette-tab tab-side tab-left"></div>
                    <div class="cassette-tab tab-side tab-right"></div>

                    <div class="screw tl"><div class="dot"></div></div>
                    <div class="screw tr"><div class="dot"></div></div>
                    <div class="screw bl"><div class="dot"></div></div>
                    <div class="screw br"><div class="dot"></div></div>

                    <div class="label-area">
                        <img src="icon.png" class="hidden-preload" style="display:none;" alt="preload">
                        <div class="brand">WAGBA MUSIC</div>
                        <div class="sub-brand">Aesthetic Lo-Fi</div>

                        <div class="tape-window">
                            <div class="magnetic-tape-bg"></div>
                            <div class="magnetic-tape-bridge"></div>
                            
                            <div class="reel-container">
                                <div class="reel reel-left">
                                    <div class="hub"></div>
                                    <div class="spokes">
                                        <div class="spoke"></div><div class="spoke rot30"></div><div class="spoke rot60"></div><div class="spoke rot90"></div><div class="spoke rot120"></div><div class="spoke rot150"></div>
                                    </div>
                                </div>
                                <div class="reel reel-right">
                                    <div class="hub"></div>
                                    <div class="spokes">
                                        <div class="spoke"></div><div class="spoke rot30"></div><div class="spoke rot60"></div><div class="spoke rot90"></div><div class="spoke rot120"></div><div class="spoke rot150"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <form id="mood-form">
                            <input type="text" id="mood-input" placeholder="Type your mood..." autocomplete="off" required>
                        </form>
                    </div>

                    <div class="cassette-bottom">
                        <div class="controls" id="player-controls">
                            <button id="btn-prev" class="retro-btn" title="Previous Track">⏮</button>
                            <button id="btn-play-pause" class="retro-btn" title="Play/Pause">⏸</button>
                            <button id="btn-next" class="retro-btn" title="Next Track">⏭</button>
                        </div>
                    </div>
                </div>

                <div class="cassette-face cassette-back">
                    <div class="cassette-tab tab-top tab-left"></div>
                    <div class="cassette-tab tab-top tab-right"></div>
                    <div class="cassette-tab tab-side tab-left"></div>
                    <div class="cassette-tab tab-side tab-right"></div>

                    <div class="screw tl"><div class="dot"></div></div>
                    <div class="screw tr"><div class="dot"></div></div>
                    <div class="screw bl"><div class="dot"></div></div>
                    <div class="screw br"><div class="dot"></div></div>

                    <div class="label-area back-label">
                        <div id="youtube-embed"></div>
                        <div class="playlist-container">
                            <ul id="playlist"></ul>
                        </div>
                    </div>
                </div>
            </div>
            <div id="loading" class="hidden">Winding tape...</div>
        </div>
    </div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
