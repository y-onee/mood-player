name: Deploy to Amazon ECR

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: mood-player-flask
  RADIO_ECR_REPOSITORY: mood-player-radio
  TF_VAR_youtube_api_key: ${{ secrets.YOUTUBE_API_KEY }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::700903221181:role/github-actions-role
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Lambda Dependencies
        run: |
          python3 -m pip install requests -t ./lambda

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        working-directory: ./fargate
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build with both the specific commit sha tag and the latest tag
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          # Push all tags for this repository
          docker push -a $ECR_REGISTRY/$ECR_REPOSITORY

      - name: Build, tag, and push radio image to Amazon ECR
        working-directory: ./radio
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$RADIO_ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$RADIO_ECR_REPOSITORY:latest .
          docker push -a $ECR_REGISTRY/$RADIO_ECR_REPOSITORY

      - name: Deploy Frontend to S3
        working-directory: ./terraform
        run: |
          FRONTEND_BUCKET=$(terraform output -raw s3_bucket_name)
          aws s3 sync ../frontend s3://$FRONTEND_BUCKET/ --delete

      - name: Print Frontend URL
        working-directory: ./terraform
        run: |
          FRONTEND_URL=$(terraform output -raw cloudfront_url)
          echo "========================================"
          echo "Deployment successful!"
          echo "Cassette UI is live at: $FRONTEND_URL"
          echo "========================================"

      - name: Run Fargate Task
        working-directory: ./terraform
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          TASK_DEF=$(terraform output -raw ecs_task_definition)
          SUBNET=$(terraform output -raw public_subnet_id)
          SG=$(terraform output -raw fargate_sg_id)

          echo "Triggering Fargate Task on cluster $CLUSTER"
          aws ecs run-task \
            --cluster $CLUSTER \
            --task-definition $TASK_DEF \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET],securityGroups=[$SG],assignPublicIp=ENABLED}"
